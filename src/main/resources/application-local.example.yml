# Copy this file to application-local.yml and fill local secrets.
# application-local.yml is ignored by git.

spring:
  ai:
    dashscope:
      enabled: true
      api-key: ${AI_DASHSCOPE_API_KEY:}
      agent:
        api-key: ${AI_DASHSCOPE_API_KEY:}

app:
  deepresearch:
    search:
      tavily-api-key: ${TAVILY_API_KEY:}
      serpapi-api-key: ${SERPAPI_API_KEY:}
      jina-api-key: ${JINA_API_KEY:}
